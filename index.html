<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emporio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <script src="catalogo.js"></script>

    <style>
        :root { --primary-color: #2c3e50; --accent-color: #f39c12; --danger-color: #e74c3c; --bg-color: #f4f4f9; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        h1, h2 { text-align: center; color: var(--primary-color); }
        .db-indicator { text-align: center; font-weight: bold; color: #27ae60; background: #e8f8f5; padding: 10px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #c3e6cb; }
        .form-group { max-width: 600px; margin: 0 auto 30px auto; display: flex; flex-direction: column; gap: 15px; padding: 20px; background: #ecf0f1; border-radius: 8px; border-left: 5px solid var(--accent-color); }
        label { font-weight: bold; color: #34495e; margin-bottom: -5px; }
        input[type="text"], select { padding: 12px; font-size: 18px; border: 1px solid #bdc3c7; border-radius: 6px; outline: none; }
        input[type="text"]:focus, select:focus { border-color: var(--accent-color); }
        button { padding: 12px 20px; font-size: 16px; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-save { background-color: var(--primary-color); padding: 14px; margin-top: 5px; }
        .btn-export { background-color: #27ae60; margin-bottom: 20px; width: 100%; max-width: 300px; display: block; margin-left: auto; margin-right: auto; }
        .delete-btn { background-color: var(--danger-color); width: 100%; margin-top: 15px; }
        .category-section { margin-top: 40px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 3px solid var(--accent-color); color: var(--primary-color); text-transform: uppercase; font-size: 24px; font-weight: bold; }
        .product-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-top: 20px; }
        .product-card { background: white; border: 2px solid #ddd; border-radius: 8px; padding: 20px; text-align: center; }
        .product-card h3 { margin: 0 0 15px 0; font-size: 18px; word-break: break-word; }
        svg { max-width: 100%; height: auto; }
        @media (max-width: 768px) { .product-list { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Emporio - Interfaccia Operativa</h1>
        <div class="db-indicator" id="dbStatus">⏳ Connessione al database in corso...</div>
        <!-- <button class="btn-export" onclick="exportDatabase()">💾 Scarica Backup Database</button> -->
        
        <div class="form-group">
            <label for="barcodeInput">1. Scansiona codice EAN-13 (12 o 13 cifre):</label>
            <input type="text" id="barcodeInput" placeholder="Spara qui il codice..." autofocus>
            <label for="nameInput">2. Nome del prodotto:</label>
            <input type="text" id="nameInput" placeholder="Es. Libro o Prodotto">
            <label for="categoryInput">3. Categoria:</label>
            <select id="categoryInput">
                <option value="CODICI EAN PRODOTTI AGEA">CODICI EAN PRODOTTI AGEA</option>
                <option value="CODICI EAN PRODOTTI MARCHE VARIE">CODICI EAN PRODOTTI MARCHE VARIE</option>
            </select>
            <button class="btn-save" onclick="processInput()">➕ Aggiungi al Catalogo</button>
        </div>

        <div id="productsContainer"></div>
    </div>

    <script>
        let db;
        const request = indexedDB.open("EmporioDatabaseV3", 1); 

        request.onupgradeneeded = function(event) {
            db = event.target.result;
            if (!db.objectStoreNames.contains("prodotti")) {
                db.createObjectStore("prodotti", { keyPath: "id" });
            }
        };

        request.onsuccess = function(event) {
            db = event.target.result;
            document.getElementById('dbStatus').innerHTML = "✅ Database di sistema attivo e pronto!";
            
            // Richiama la funzione di precaricamento dal file catalogo.js
            if (typeof eseguiPrecaricamentoCatalogo === "function") {
                eseguiPrecaricamentoCatalogo(db, loadAndRenderProducts);
            } else {
                loadAndRenderProducts();
            }
        };

        request.onerror = function(event) {
            document.getElementById('dbStatus').innerHTML = "❌ Errore nell'apertura del database!";
            document.getElementById('dbStatus').style.color = "red";
        };

        const barcodeInput = document.getElementById('barcodeInput');
        const nameInput = document.getElementById('nameInput');
        const categoryInput = document.getElementById('categoryInput');

        barcodeInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); if(barcodeInput.value.trim() !== '') nameInput.focus(); }
        });

        nameInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); processInput(); }
        });

        function processInput() {
            const barcode = barcodeInput.value.trim();
            const name = nameInput.value.trim();
            const category = categoryInput.value;

            if (!barcode || !name) { alert("Inserisci codice e nome."); return; }
            const ean13Regex = /^\d{12,13}$/;
            if (!ean13Regex.test(barcode)) { alert("Il formato EAN-13 richiede 12 o 13 numeri."); barcodeInput.focus(); return; }

            const newProduct = { id: Date.now(), barcode: barcode, name: name, category: category };
            const transaction = db.transaction(["prodotti"], "readwrite");
            const request = transaction.objectStore("prodotti").add(newProduct);

            request.onsuccess = function() {
                barcodeInput.value = ''; nameInput.value = ''; barcodeInput.focus(); loadAndRenderProducts();
            };
        }

        function deleteProductFromDB(id) {
            if(!confirm("Sei sicuro di voler eliminare questo prodotto?")) return;
            const transaction = db.transaction(["prodotti"], "readwrite");
            transaction.objectStore("prodotti").delete(id).onsuccess = function() { loadAndRenderProducts(); };
        }

        function exportDatabase() {
            const request = db.transaction(["prodotti"], "readonly").objectStore("prodotti").getAll();
            request.onsuccess = function(event) {
                const products = event.target.result;
                if (products.length === 0) { alert("Il database è vuoto!"); return; }
                const blob = new Blob([JSON.stringify(products, null, 2)], { type: "application/json" });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob); a.download = 'backup_database_emporio.json';
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            };
        }

        function loadAndRenderProducts() {
            const request = db.transaction(["prodotti"], "readonly").objectStore("prodotti").getAll();

            request.onsuccess = function(event) {
                const products = event.target.result;
                const container = document.getElementById('productsContainer');
                container.innerHTML = ''; 
                if (products.length === 0) { container.innerHTML = '<p style="text-align:center;">Nessun prodotto.</p>'; return; }

                const groupedProducts = { "CODICI EAN PRODOTTI AGEA": [], "CODICI EAN PRODOTTI MARCHE VARIE": [] };
                products.forEach(p => {
                    if(groupedProducts[p.category]) groupedProducts[p.category].push(p);
                    else groupedProducts["CODICI EAN PRODOTTI MARCHE VARIE"].push(p);
                });

                for (const category in groupedProducts) {
                    if (groupedProducts[category].length > 0) {
                        const sorted = groupedProducts[category].sort((a, b) => a.name.localeCompare(b.name));
                        const title = document.createElement('div'); title.className = 'category-section'; title.innerText = category;
                        container.appendChild(title);

                        const grid = document.createElement('div'); grid.className = 'product-list';
                        sorted.forEach(product => {
                            const card = document.createElement('div'); card.className = 'product-card';
                            card.innerHTML = `<h3>${product.name}</h3><svg id="barcode-${product.id}"></svg><button class="delete-btn" onclick="deleteProductFromDB(${product.id})">🗑️ Elimina</button>`;
                            grid.appendChild(card);
                        });
                        container.appendChild(grid);

                        sorted.forEach(product => {
                            try { JsBarcode(`#barcode-${product.id}`, product.barcode, { format: "EAN13", width: 2, height: 70, displayValue: true, fontSize: 18, margin: 10 }); } 
                            catch (e) { document.getElementById(`barcode-${product.id}`).outerHTML = "<p style='color:red;'>Codice non valido</p>"; }
                        });
                    }
                }
            };
        }
    </script>
</body>
</html>
